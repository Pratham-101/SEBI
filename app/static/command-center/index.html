<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEBI Compliance Monitor</title>
  <style>
    :root {
      --bg: #f7f8fa;
      --panel: #ffffff;
      --border: #e6e8ec;
      --text: #1a1d21;
      --muted: #6b7280;
      --accent: #5b5bd6;       /* DevRev-ish purple */
      --accent-soft: #eef0fb;
      --crit: #dc2626;
      --high: #ea580c;
      --med: #d97706;
      --low: #2563eb;
      --green: #16a34a;
      --shadow: 0 1px 2px rgba(16,24,40,.06), 0 1px 3px rgba(16,24,40,.04);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px; line-height: 1.5;
    }
    header.topbar {
      background: var(--panel); border-bottom: 1px solid var(--border);
      padding: 14px 28px; display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
    }
    .brand { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 16px; }
    .brand .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--green); box-shadow: 0 0 0 3px rgba(22,163,74,.15); }
    .brand .sub { color: var(--muted); font-weight: 400; font-size: 13px; }
    .topbar .meta { color: var(--muted); font-size: 12.5px; }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 24px 28px 60px; }

    .summary-line { font-size: 15px; color: var(--text); margin: 4px 0 20px; }
    .summary-line b { font-weight: 600; }

    .cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
    .card {
      background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
      padding: 16px 18px; box-shadow: var(--shadow);
    }
    .card .label { color: var(--muted); font-size: 12.5px; margin-bottom: 6px; }
    .card .value { font-size: 26px; font-weight: 600; letter-spacing: -.5px; }
    .card .value.accent { color: var(--accent); }
    .card .value.warn { color: var(--high); }

    .toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 14px; }
    .toolbar input, .toolbar select {
      padding: 8px 11px; border: 1px solid var(--border); border-radius: 8px; background: var(--panel);
      font-size: 13.5px; color: var(--text); outline: none;
    }
    .toolbar input:focus, .toolbar select:focus { border-color: var(--accent); }
    .toolbar input[type=search] { min-width: 240px; }
    .toolbar .spacer { flex: 1; }
    .btn {
      padding: 8px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--panel);
      cursor: pointer; font-size: 13.5px; color: var(--text);
    }
    .btn:hover { background: #f0f1f4; }

    .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; box-shadow: var(--shadow); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); font-weight: 600; padding: 12px 16px; border-bottom: 1px solid var(--border); }
    td { padding: 13px 16px; border-bottom: 1px solid var(--border); vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr.row:hover { background: #fafbfc; cursor: pointer; }
    .title-cell { font-weight: 500; max-width: 460px; }
    .title-cell .src { display: block; color: var(--muted); font-size: 12px; font-weight: 400; margin-top: 2px; }

    .badge { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .b-crit { background: #fef2f2; color: var(--crit); }
    .b-high { background: #fff7ed; color: var(--high); }
    .b-med  { background: #fffbeb; color: var(--med); }
    .b-low  { background: #eff6ff; color: var(--low); }
    .b-none { background: #f3f4f6; color: var(--muted); }
    .pill { display:inline-block; padding: 2px 9px; border-radius: 6px; font-size: 12px; background: var(--accent-soft); color: var(--accent); font-weight: 500; }
    .status-ticketed { color: var(--green); font-weight: 500; }
    .status-pending { color: var(--muted); }
    .ticket-link { color: var(--accent); text-decoration: none; font-weight: 600; }
    .ticket-link:hover { text-decoration: underline; }
    .muted { color: var(--muted); }

    .empty { padding: 48px; text-align: center; color: var(--muted); }
    .loading { padding: 48px; text-align: center; color: var(--muted); }

    /* Drawer */
    .drawer-bg { position: fixed; inset: 0; background: rgba(16,24,40,.35); display: none; z-index: 20; }
    .drawer-bg.open { display: block; }
    .drawer {
      position: fixed; top: 0; right: -560px; width: 540px; max-width: 92vw; height: 100%;
      background: var(--panel); box-shadow: -8px 0 28px rgba(16,24,40,.16); z-index: 30;
      transition: right .22s ease; overflow-y: auto;
    }
    .drawer.open { right: 0; }
    .drawer .dhead { padding: 20px 24px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--panel); }
    .drawer .dhead h2 { margin: 6px 0 0; font-size: 17px; }
    .drawer .dbody { padding: 20px 24px 60px; }
    .drawer .close { float: right; cursor: pointer; color: var(--muted); font-size: 20px; border: none; background: none; }
    .section { margin-bottom: 22px; }
    .section h3 { font-size: 12px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); margin: 0 0 8px; }
    .kv { display: flex; gap: 8px; margin: 5px 0; }
    .kv .k { color: var(--muted); min-width: 120px; }
    .action-item { padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px; }
    .action-item .ai-meta { color: var(--muted); font-size: 12px; margin-top: 4px; }
    .date-item { padding: 8px 12px; background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px; margin-bottom: 6px; }
    .cta { display:inline-block; margin-top: 6px; padding: 9px 16px; background: var(--accent); color:#fff; border-radius: 8px; text-decoration: none; font-weight: 600; }
    a.srclink { color: var(--accent); }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="dot"></span>
      <span>SEBI Compliance Monitor</span>
      <span class="sub" id="tenantName"></span>
    </div>
    <div class="meta" id="topMeta">Auto-refreshing every 60s</div>
  </header>

  <div class="wrap">
    <div class="summary-line" id="summaryLine">Loading latest regulatory updates…</div>

    <div class="cards" id="cards"></div>

    <div class="toolbar">
      <input type="search" id="search" placeholder="Search updates…" />
      <select id="fPriority">
        <option value="">All priorities</option>
        <option value="CRITICAL">Critical</option>
        <option value="HIGH">High</option>
        <option value="MEDIUM">Medium</option>
        <option value="LOW">Low</option>
      </select>
      <select id="fTeam">
        <option value="">All teams</option>
        <option>Legal Team</option>
        <option>Compliance Team</option>
        <option>Finance Team</option>
        <option>Operations Team</option>
        <option>InfoSec Team</option>
        <option>Executive Leaders Team</option>
      </select>
      <select id="fStatus">
        <option value="">All statuses</option>
        <option value="ticketed">Ticketed</option>
        <option value="pending">Pending</option>
      </select>
      <div class="spacer"></div>
      <button class="btn" id="refreshBtn">Refresh</button>
    </div>

    <div class="panel">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Update</th>
            <th>Priority</th>
            <th>Owning team</th>
            <th>Status</th>
            <th>DevRev</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="6" class="loading">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="drawer-bg" id="drawerBg" onclick="closeDrawer()"></div>
  <aside class="drawer" id="drawer">
    <div class="dhead">
      <button class="close" onclick="closeDrawer()">×</button>
      <div id="dBadges"></div>
      <h2 id="dTitle"></h2>
    </div>
    <div class="dbody" id="dBody"></div>
  </aside>

  <script>
    const API = "/api/v1/console";
    const badgeClass = p => ({CRITICAL:"b-crit",HIGH:"b-high",MEDIUM:"b-med",LOW:"b-low"}[(p||"").toUpperCase()] || "b-none");
    const esc = s => (s==null?"":String(s)).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));

    async function loadSummary() {
      try {
        const s = await (await fetch(`${API}/summary`)).json();
        document.getElementById("tenantName").textContent = s.tenant && s.tenant !== "default" ? `· ${s.tenant}` : "";
        document.getElementById("cards").innerHTML = `
          <div class="card"><div class="label">Total SEBI updates tracked</div><div class="value">${s.total_updates}</div></div>
          <div class="card"><div class="label">High / critical priority</div><div class="value warn">${s.high_priority}</div></div>
          <div class="card"><div class="label">DevRev tickets created</div><div class="value accent">${s.tickets_created}</div></div>
          <div class="card"><div class="label">Open obligations</div><div class="value">${s.open_obligations}</div></div>`;
        document.getElementById("summaryLine").innerHTML =
          `Monitoring <b>${esc(s.regulator)}</b> every <b>${s.scan_interval_minutes} minutes</b> — ` +
          `<b>${s.high_priority}</b> high-priority items, all routed into DevRev as tickets.`;
        document.getElementById("topMeta").textContent = `${esc(s.regulator)} · auto-refresh 60s`;
      } catch (e) { /* keep going */ }
    }

    async function loadUpdates() {
      const p = new URLSearchParams();
      const pr = document.getElementById("fPriority").value;
      const tm = document.getElementById("fTeam").value;
      const st = document.getElementById("fStatus").value;
      const sr = document.getElementById("search").value.trim();
      if (pr) p.set("priority", pr);
      if (tm) p.set("team", tm);
      if (st) p.set("status", st);
      if (sr) p.set("search", sr);
      const tbody = document.getElementById("tbody");
      try {
        const data = await (await fetch(`${API}/updates?${p.toString()}`)).json();
        if (!data.items || !data.items.length) {
          tbody.innerHTML = `<tr><td colspan="6" class="empty">No updates match these filters yet.</td></tr>`;
          return;
        }
        tbody.innerHTML = data.items.map(it => `
          <tr class="row" onclick="openDetail(${it.id})">
            <td class="muted" style="white-space:nowrap">${esc(it.published_date || "—")}</td>
            <td class="title-cell">${esc(it.title)}<span class="src">${esc((it.type||"").replace("_"," "))}</span></td>
            <td><span class="badge ${badgeClass(it.priority)}">${esc(it.priority)}</span></td>
            <td>${it.team && it.team !== "—" ? `<span class="pill">${esc(it.team)}</span>` : '<span class="muted">—</span>'}${it.assignee ? `<div class="muted" style="font-size:12px;margin-top:3px">${esc(it.assignee)}</div>`:""}</td>
            <td class="${it.status==='ticketed'?'status-ticketed':'status-pending'}">${it.status==='ticketed'?'● Ticketed':'○ Pending'}</td>
            <td>${it.devrev_display_id ? (it.devrev_url ? `<a class="ticket-link" href="${esc(it.devrev_url)}" target="_blank" onclick="event.stopPropagation()">${esc(it.devrev_display_id)}</a>` : `<span class="ticket-link">${esc(it.devrev_display_id)}</span>`) : '<span class="muted">—</span>'}</td>
          </tr>`).join("");
      } catch (e) {
        tbody.innerHTML = `<tr><td colspan="6" class="empty">Could not load updates.</td></tr>`;
      }
    }

    async function openDetail(id) {
      const bg = document.getElementById("drawerBg"), dr = document.getElementById("drawer");
      bg.classList.add("open"); dr.classList.add("open");
      document.getElementById("dBody").innerHTML = `<div class="loading">Loading…</div>`;
      document.getElementById("dTitle").textContent = "";
      document.getElementById("dBadges").innerHTML = "";
      try {
        const d = await (await fetch(`${API}/updates/${id}`)).json();
        document.getElementById("dTitle").textContent = d.title || "";
        document.getElementById("dBadges").innerHTML =
          `<span class="badge ${badgeClass(d.priority)}">${esc(d.priority||"—")}</span> ` +
          (d.regulatory_domain ? `<span class="pill">${esc(d.regulatory_domain)}</span>` : "");
        const dates = (d.important_dates||[]).map(x => `<div class="date-item"><b>${esc(x.label||"Date")}:</b> ${esc(x.date_text||"")}</div>`).join("") || '<span class="muted">None identified in source.</span>';
        const actions = (d.action_items||[]).map(a => `<div class="action-item">${esc(a.action)}<div class="ai-meta">${esc(a.owner_team||"")} · ${esc((a.urgency||"standard"))}</div></div>`).join("") || '<span class="muted">None.</span>';
        const obs = (d.obligations||[]).map(o => `<div class="action-item">${esc(o.description)}<div class="ai-meta">${esc(o.owner_team||"")} · deadline: ${esc(o.deadline||"—")} · ${esc(o.status)}</div></div>`).join("") || '<span class="muted">None tracked.</span>';
        document.getElementById("dBody").innerHTML = `
          <div class="section">
            <h3>Summary</h3>
            <div>${esc(d.summary || "No summary available.")}</div>
          </div>
          <div class="section">
            <h3>Routing</h3>
            <div class="kv"><span class="k">Owning team</span><span>${esc(d.team||"—")}</span></div>
            <div class="kv"><span class="k">Assigned to</span><span>${esc(d.assignee||"Unassigned")}</span></div>
            <div class="kv"><span class="k">Published</span><span>${esc(d.published_date||"—")}</span></div>
            ${d.devrev_url ? `<a class="cta" href="${esc(d.devrev_url)}" target="_blank">Open ${esc(d.devrev_display_id)} in DevRev →</a>` : (d.devrev_display_id ? `<div class="kv"><span class="k">DevRev</span><span>${esc(d.devrev_display_id)}</span></div>` : "")}
          </div>
          <div class="section"><h3>Key dates / deadlines</h3>${dates}</div>
          <div class="section"><h3>Recommended actions</h3>${actions}</div>
          <div class="section"><h3>Obligations</h3>${obs}</div>
          <div class="section"><h3>Source</h3><a class="srclink" href="${esc(d.source_url)}" target="_blank">View original SEBI notification →</a></div>
        `;
      } catch (e) {
        document.getElementById("dBody").innerHTML = `<div class="empty">Could not load details.</div>`;
      }
    }
    function closeDrawer() {
      document.getElementById("drawerBg").classList.remove("open");
      document.getElementById("drawer").classList.remove("open");
    }

    function refresh() { loadSummary(); loadUpdates(); }
    ["fPriority","fTeam","fStatus"].forEach(id => document.getElementById(id).addEventListener("change", loadUpdates));
    let t; document.getElementById("search").addEventListener("input", () => { clearTimeout(t); t = setTimeout(loadUpdates, 300); });
    document.getElementById("refreshBtn").addEventListener("click", refresh);
    document.addEventListener("keydown", e => { if (e.key === "Escape") closeDrawer(); });
    refresh();
    setInterval(refresh, 60000);
  </script>
</body>
</html>
