services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sebi
      POSTGRES_PASSWORD: sebi
      POSTGRES_DB: sebi_regulatory
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sebi -d sebi_regulatory"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "8020:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://sebi:sebi@postgres:5432/sebi_regulatory
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  celery_worker:
    build: .
    command: celery -A app.workers.celery_app worker --loglevel=info -Q celery
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://sebi:sebi@postgres:5432/sebi_regulatory
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  pgdata:
